services:
  newapi-watchdog:
    image: ghcr.io/charyeahowo/newapi_watchdog:latest
    container_name: newapi-watchdog
    restart: always
    environment:
      - TZ=Asia/Shanghai
    command: ["-config", "/app/config/config.yaml"]
    ports:
      - "8088:8088"
    volumes:
      - ./config:/app/config:ro
      - watchdog-data:/data

volumes:
  watchdog-data:
